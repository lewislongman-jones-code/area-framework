<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.R.E.A. Results Dashboard · Intent HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a09;--bg2:#161614;--bg3:#202020;--bg4:#2a2a28;--bg5:#363634;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);--bd3:rgba(255,255,255,0.3);
  --ink:#f4f1ea;--ink2:#c8c4bb;--ink3:#908c83;--ink4:#5a5854;
  --g:#3d8a68;--gl:#52b589;--gbg:rgba(61,138,104,0.12);
  --am:#c08a30;--ambg:rgba(192,138,48,0.12);
  --rd:#a04040;--rdbg:rgba(160,64,64,0.12);
  --blue:#4a6fa5;--bluebg:rgba(74,111,165,0.12);
  --fmono:'DM Mono',monospace;--fserif:'Cormorant Garamond',serif;--fsans:'Lato',sans-serif;
}
html{font-size:16px}
body{font-family:var(--fsans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{background:rgba(12,12,10,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd2);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;position:sticky;top:0;z-index:100}
.nav-l{display:flex;align-items:center;gap:14px}
.nav-sep{width:1px;height:18px;background:var(--bd2)}
.nav-tag{font-family:var(--fmono);font-size:11px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}
.nav-r{display:flex;align-items:center;gap:10px}
.refresh-btn{background:transparent;border:1px solid var(--bd2);color:var(--ink2);font-family:var(--fmono);font-size:11px;letter-spacing:.05em;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.refresh-btn:hover{border-color:var(--gl);color:var(--gl);background:var(--gbg)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--gl);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.live-label{font-family:var(--fmono);font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}

/* HERO */
.hero{padding:3.5rem 2.5rem 3rem;border-bottom:1px solid var(--bd2);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse at center,rgba(61,138,104,.12) 0%,transparent 65%);pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1.5rem}
.hero-eyebrow{font-family:var(--fmono);font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--gl);margin-bottom:.75rem}
.hero h1{font-family:var(--fserif);font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.1;color:var(--ink)}
.hero h1 em{font-style:italic;color:var(--gl)}
.hero-meta{font-size:14px;color:var(--ink3);margin-top:.5rem;font-weight:300}
.hero-stats{display:flex;gap:2rem;flex-wrap:wrap}
.stat-block{text-align:right}
.stat-n{font-family:var(--fserif);font-size:3rem;font-weight:400;line-height:1;color:var(--ink)}
.stat-n em{color:var(--gl);font-style:normal}
.stat-l{font-family:var(--fmono);font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}

/* BODY */
.body{max-width:1200px;margin:0 auto;padding:2.5rem 2.5rem 5rem}

/* SECTION */
.section-label{font-family:var(--fmono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:.75rem;display:block}

/* OVERALL SCORE STRIP */
.overall-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:2rem}
.os-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.4rem 1.5rem;position:relative;overflow:hidden}
.os-bar{position:absolute;bottom:0;left:0;height:3px}
.os-bar.all{background:var(--gl)}
.os-bar.p0{background:var(--g)}.os-bar.p1{background:#506ebe}.os-bar.p2{background:var(--am)}.os-bar.p3{background:#965082}
.os-label{font-family:var(--fmono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.os-score{font-family:var(--fserif);font-size:2.8rem;font-weight:400;color:var(--ink);line-height:1}
.os-denom{font-family:var(--fmono);font-size:10px;color:var(--ink3);margin-top:2px}
.os-sub{font-size:13px;color:var(--ink3);margin-top:8px;font-weight:300}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
@media(max-width:900px){.charts-row{grid-template-columns:1fr}}
.cpanel{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.75rem 2rem}
.ctitle{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px}
.csub{font-size:13px;color:var(--ink3);margin-bottom:1.5rem}
.chart-wrap{position:relative;height:320px}
.chart-wrap-tall{position:relative;height:380px}

/* SECTOR TABLE */
.sector-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.75rem 2rem;margin-bottom:1.5rem}
.stbl{width:100%;border-collapse:collapse;font-size:14px}
.stbl th{font-family:var(--fmono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:.65rem 1rem;border-bottom:1px solid var(--bd2);text-align:left;white-space:nowrap}
.stbl td{padding:.7rem 1rem;border-bottom:1px solid var(--bd);color:var(--ink2);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:rgba(255,255,255,.02)}
.rank-badge{font-family:var(--fmono);font-size:10px;font-weight:500;color:var(--ink4);width:24px;display:inline-block}
.score-pill{font-family:var(--fmono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block}
.sector-name{font-weight:400;color:var(--ink)}
.sector-icon{margin-right:6px}
.resp-count{font-family:var(--fmono);font-size:11px;color:var(--ink4)}

/* ARCHETYPE BREAKDOWN */
.arch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem}
.arch-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.25rem 1.4rem}
.arch-name{font-family:var(--fserif);font-size:1.3rem;font-weight:400;font-style:italic;margin-bottom:.35rem}
.arch-name.a0{color:#908c83}
.arch-name.a1{color:#c08a30}
.arch-name.a2{color:#4a6fa5}
.arch-name.a3{color:var(--gl)}
.arch-count{font-family:var(--fmono);font-size:2rem;font-weight:400;color:var(--ink);line-height:1;margin-bottom:2px}
.arch-pct{font-family:var(--fmono);font-size:11px;color:var(--ink3)}
.arch-bar-wrap{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
.arch-bar{height:100%;border-radius:2px}

/* PILLAR BREAKDOWN TABLE */
.pillar-breakdown{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.75rem 2rem;margin-bottom:1.5rem;overflow-x:auto}
.pb-table{width:100%;border-collapse:collapse;font-size:13px}
.pb-table th{font-family:var(--fmono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:.6rem .8rem;border-bottom:1px solid var(--bd2);text-align:left;white-space:nowrap}
.pb-table td{padding:.65rem .8rem;border-bottom:1px solid var(--bd);vertical-align:middle}
.pb-table tr:last-child td{border-bottom:none}
.q-text-cell{font-size:13px;color:var(--ink2);line-height:1.4;max-width:320px}
.bar-cell{width:120px}
.bar-wrap{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}

/* LOADING / ERROR */
.loading{text-align:center;padding:5rem 2rem;color:var(--ink3);font-family:var(--fmono);font-size:13px;letter-spacing:.04em}
.dot{animation:blink 1.2s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.error-box{background:var(--rdbg);border:1px solid var(--rd);border-radius:8px;padding:1.25rem 1.5rem;font-size:13px;color:#e07070;margin:2rem 0}

/* AUTO-REFRESH COUNTDOWN */
.refresh-info{font-family:var(--fmono);font-size:10px;color:var(--ink4);letter-spacing:.04em}

/* LOGO */
.logo-svg{height:24px;width:auto;display:block}

/* FOOTER */
.footer{border-top:1px solid var(--bd);padding:1.5rem 2.5rem;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.footer-l{font-family:var(--fmono);font-size:10px;color:var(--ink4);letter-spacing:.04em}

@media(max-width:640px){
  nav{padding:0 1rem}.nav-tag{display:none}
  .hero{padding:2rem 1rem 1.5rem}.body{padding:1.5rem 1rem 4rem}
  .hero-stats{flex-direction:row}.stat-block{text-align:left}
}
</style>
</head>
<body>

<nav>
  <div class="nav-l">
    <svg class="logo-svg" viewBox="0 0 130 26" fill="none"><text x="0" y="20" font-family="Lato,sans-serif" font-weight="700" font-size="17" fill="#f4f1ea" letter-spacing="-0.3">intent</text><circle cx="107" cy="10" r="5" fill="#3d8a68"/><text x="114" y="20" font-family="Lato,sans-serif" font-weight="300" font-size="11" fill="#c8c4bb">hq</text></svg>
    <div class="nav-sep"></div>
    <span class="nav-tag">A.R.E.A. Results Dashboard</span>
  </div>
  <div class="nav-r">
    <div class="live-dot"></div>
    <span class="live-label">Live</span>
    <span class="refresh-info" id="refreshInfo">Refreshes every 60s</span>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh now</button>
  </div>
</nav>

<div id="mainContent">
  <div class="loading">Loading results<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG — same sheet as the assessment tool
══════════════════════════════════════════════ */
const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwyxA6pFBtH4YhsP9ZGO6P-6dLNlsg936H-BSvX4ngL3egPKV06ZxxL1XepWtaWaxeeww/exec',
  SHEET_ID:   '1-iF-idKQX0Ieb_BPDm9h8xS9O7Zagk4WfX3tkLFaM7k',
  API_KEY:    'AIzaSyCahXu-IcdcMMowVl2_J3EWDf83dfLaN-o',
  SHEET_NAME: 'responses'
};

const SECTORS=[
  {id:'telecom',    label:'Telecoms',             icon:'📡'},
  {id:'banking',    label:'Banking & FSI',         icon:'🏦'},
  {id:'insurance',  label:'Insurance',             icon:'🛡️'},
  {id:'retail',     label:'Retail',                icon:'🛍️'},
  {id:'media',      label:'Media & Tech',          icon:'📱'},
  {id:'utilities',  label:'Utilities',             icon:'⚡'},
  {id:'healthcare', label:'Healthcare',            icon:'🏥'},
  {id:'govt',       label:'Government',            icon:'🏛️'},
  {id:'travel',     label:'Travel & Hospitality',  icon:'✈️'},
  {id:'fmcg',       label:'FMCG',                  icon:'🧴'},
  {id:'auto',       label:'Automotive',            icon:'🚗'},
  {id:'other',      label:'Other',                 icon:'🏢'},
];

const PN=['Accessible Signals','Real Decision Clarity','Execution & Learning','Adoption & Governance'];
const P_SHORT=['Signals','Decisions','Execution','Governance'];
const PILLAR_KEYS=[['a1','a2','a3','a4'],['r1','r2','r3'],['e1','e2','e3'],['g1','g2','g3']];
const Q_LABELS={
  a1:'Unified data, not siloed by system',
  a2:'Systematic data quality process',
  a3:'Shared definitions of value and intent',
  a4:'Real-time or near-real-time signals',
  r1:'Consistent value metrics across teams',
  r2:'End-to-end workflow redesign for AI',
  r3:'Intent detection over campaign calendars',
  e1:'AI decisions visible and auditable',
  e2:'Clear autonomous vs human-review boundary',
  e3:'Outcome feedback loops in place',
  g1:'Shared documented AI risk appetite',
  g2:'Team has organisational context to direct AI',
  g3:'Executive alignment on AI vision and ownership'
};
const ALL_Q_IDS=['a1','a2','a3','a4','r1','r2','r3','e1','e2','e3','g1','g2','g3'];

const ARCH=[
  {name:'Foundation Builder', r:[1,2.4],   cls:'a0', color:'#908c83'},
  {name:'Fragmented Performer',r:[2.4,3.2], cls:'a1', color:'#c08a30'},
  {name:'Controlled Operator', r:[3.2,4.0], cls:'a2', color:'#4a6fa5'},
  {name:'Agentic Ready',       r:[4.0,5.1], cls:'a3', color:'#52b589'},
];

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0}
function pillarAvg(rows,keys){return avg(rows.map(r=>avg(keys.map(k=>+(r[k]||0)))))}
function scoreColor(s){return s>=4?'#52b589':s>=3?'#c08a30':'#d46e6e'}
function scoreBg(s){return s>=4?'var(--gbg)':s>=3?'var(--ambg)':'var(--rdbg)'}
function pill(s){return `<span class="score-pill" style="background:${scoreBg(s)};color:${scoreColor(s)}">${s.toFixed(1)}</span>`}
function archFor(ov){return ARCH.find(a=>ov>=a.r[0]&&ov<a.r[1])||ARCH[3]}
function sectorLabel(id){return SECTORS.find(s=>s.id===id)||{label:id,icon:'🏢'}}

let charts=[];
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}

/* ══════════════════════════════════════════════
   FETCH FROM SHEET
══════════════════════════════════════════════ */
async function loadData(){
  if(CONFIG.API_KEY==='YOUR_GOOGLE_SHEETS_API_KEY_HERE'){
    showError('API key not configured. Add your Google Sheets API key to the CONFIG block in this file.');
    return;
  }
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${CONFIG.SHEET_NAME}!A2:P?key=${CONFIG.API_KEY}`;
    const resp=await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status+' — check API key and sheet permissions');
    const data=await resp.json();
    const rows=(data.values||[]).map(r=>({
      sector: r[1]||'other',
      a1:+r[2]||0, a2:+r[3]||0, a3:+r[4]||0, a4:+r[5]||0,
      r1:+r[6]||0, r2:+r[7]||0, r3:+r[8]||0,
      e1:+r[9]||0, e2:+r[10]||0, e3:+r[11]||0,
      g1:+r[12]||0, g2:+r[13]||0, g3:+r[14]||0,
      overall:+r[15]||0
    })).filter(r=>r.overall>0);

    if(rows.length===0){
      showError('No responses yet. Once participants complete the assessment, results will appear here automatically.');
      return;
    }
    render(rows);
  }catch(e){
    showError('Could not load data: '+e.message+'<br><small>Check the API key is correct and the sheet is shared as "Anyone with the link can view".</small>');
  }
}

function showError(msg){
  document.getElementById('mainContent').innerHTML=`<div class="body"><div class="error-box">${msg}</div></div>`;
}

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function render(rows){
  destroyCharts();
  const total=rows.length;
  const overallAvg=avg(rows.map(r=>r.overall));
  const pillarAvgs=PILLAR_KEYS.map(keys=>pillarAvg(rows,keys));

  // Sector summary
  const sectorMap={};
  rows.forEach(r=>{
    if(!sectorMap[r.sector]) sectorMap[r.sector]={rows:[]};
    sectorMap[r.sector].rows.push(r);
  });
  const sectors=Object.entries(sectorMap)
    .map(([id,{rows:sr}])=>({
      id, rows:sr, n:sr.length,
      overall:avg(sr.map(r=>r.overall)),
      pillars:PILLAR_KEYS.map(keys=>pillarAvg(sr,keys))
    }))
    .sort((a,b)=>b.overall-a.overall);

  // Archetype counts
  const archCounts=ARCH.map(a=>({...a,count:rows.filter(r=>r.overall>=a.r[0]&&r.overall<a.r[1]).length}));

  // Per-question averages
  const qAvgs={};
  ALL_Q_IDS.forEach(id=>{ qAvgs[id]=avg(rows.map(r=>r[id]||0)); });

  // ── BUILD HTML ──
  let html=`
  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-eyebrow">Workshop Two · Live Results</div>
        <h1>A.R.E.A. <em>Readiness</em><br>Dashboard</h1>
        <div class="hero-meta">Agentic AI readiness across all participants · refreshes live</div>
      </div>
      <div class="hero-stats">
        <div class="stat-block">
          <div class="stat-n">${total}</div>
          <div class="stat-l">Responses</div>
        </div>
        <div class="stat-block">
          <div class="stat-n"><em>${overallAvg.toFixed(1)}</em></div>
          <div class="stat-l">Avg overall</div>
        </div>
        <div class="stat-block">
          <div class="stat-n">${sectors.length}</div>
          <div class="stat-l">Sectors</div>
        </div>
      </div>
    </div>
  </div>

  <div class="body">

    <!-- OVERALL + PILLAR SCORES -->
    <span class="section-label">Overall &amp; Pillar Averages</span>
    <div class="overall-strip">
      <div class="os-card">
        <div class="os-label">Overall average</div>
        <div class="os-score">${overallAvg.toFixed(1)}</div>
        <div class="os-denom">out of 5.0</div>
        <div class="os-sub">${archFor(overallAvg).name}</div>
        <div class="os-bar all" style="width:${(overallAvg/5*100).toFixed(0)}%"></div>
      </div>
      ${pillarAvgs.map((s,i)=>`
      <div class="os-card">
        <div class="os-label">${P_SHORT[i]}</div>
        <div class="os-score" style="color:${scoreColor(s)}">${s.toFixed(1)}</div>
        <div class="os-denom">out of 5.0</div>
        <div class="os-sub">${PN[i]}</div>
        <div class="os-bar p${i}" style="width:${(s/5*100).toFixed(0)}%"></div>
      </div>`).join('')}
    </div>

    <!-- CHARTS ROW: RADAR + BAR -->
    <div class="charts-row">
      <div class="cpanel">
        <div class="ctitle">Readiness Radar</div>
        <div class="csub">Average scores across all ${total} participants</div>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="cpanel">
        <div class="ctitle">Pillar Scores by Sector</div>
        <div class="csub">Average score per pillar, grouped by sector</div>
        <div class="chart-wrap-tall"><canvas id="sectorBar"></canvas></div>
      </div>
    </div>

    <!-- ARCHETYPE BREAKDOWN -->
    <span class="section-label">Archetype Breakdown</span>
    <div class="arch-grid">
      ${archCounts.map(a=>{
        const pct=(a.count/total*100);
        return `<div class="arch-card">
          <div class="arch-name ${a.cls}">${a.name}</div>
          <div class="arch-count">${a.count}</div>
          <div class="arch-pct">${pct.toFixed(0)}% of participants · ${a.r[0]}–${a.r[1] >= 5 ? '5.0' : a.r[1]} avg</div>
          <div class="arch-bar-wrap"><div class="arch-bar" style="width:${pct.toFixed(0)}%;background:${a.color}"></div></div>
        </div>`;
      }).join('')}
    </div>

    <!-- SECTOR TABLE -->
    <span class="section-label">Results by Sector</span>
    <div class="sector-panel">
      <div style="overflow-x:auto">
        <table class="stbl">
          <thead><tr>
            <th>#</th>
            <th>Sector</th>
            <th>Responses</th>
            <th>Overall</th>
            ${P_SHORT.map(p=>`<th>${p}</th>`).join('')}
            <th>Archetype</th>
          </tr></thead>
          <tbody>
            ${sectors.map((s,i)=>{
              const sec=sectorLabel(s.id);
              const arch=archFor(s.overall);
              return `<tr>
                <td><span class="rank-badge">${i+1}</span></td>
                <td><span class="sector-icon">${sec.icon}</span><span class="sector-name">${sec.label}</span></td>
                <td><span class="resp-count">${s.n}</span></td>
                <td>${pill(s.overall)}</td>
                ${s.pillars.map(p=>`<td>${pill(p)}</td>`).join('')}
                <td style="font-size:12px;color:${arch.color};font-style:italic;font-family:var(--fserif)">${arch.name}</td>
              </tr>`;
            }).join('')}
            <!-- ALL ROW -->
            <tr style="background:rgba(61,138,104,0.05);border-top:1px solid var(--bd2)">
              <td></td>
              <td><span class="sector-name" style="color:var(--gl)">All participants</span></td>
              <td><span class="resp-count">${total}</span></td>
              <td>${pill(overallAvg)}</td>
              ${pillarAvgs.map(p=>`<td>${pill(p)}</td>`).join('')}
              <td style="font-size:12px;color:${archFor(overallAvg).color};font-style:italic;font-family:var(--fserif)">${archFor(overallAvg).name}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PER-QUESTION BREAKDOWN -->
    <span class="section-label">Question-Level Averages</span>
    ${[0,1,2,3].map(pi=>{
      const qids=PILLAR_KEYS[pi];
      const pillarColors=['var(--g)','#506ebe','var(--am)','#965082'];
      return `<div class="pillar-breakdown">
        <div class="ctitle" style="margin-bottom:4px">${PN[pi]}</div>
        <div class="csub">Average score per question across all participants (1=No · 3=Partially · 5=Yes)</div>
        <table class="pb-table">
          <thead><tr><th>Question</th><th>Avg</th><th>Score</th><th style="min-width:120px">Distribution</th></tr></thead>
          <tbody>
            ${qids.map(qid=>{
              const s=qAvgs[qid]||0;
              const pct=((s-1)/4*100).toFixed(0);
              return `<tr>
                <td class="q-text-cell">${Q_LABELS[qid]}</td>
                <td>${pill(s)}</td>
                <td style="font-family:var(--fmono);font-size:12px;color:var(--ink3)">${s.toFixed(2)}/5</td>
                <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${pillarColors[pi]}"></div></div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }).join('')}

  </div>

  <div class="footer">
    <div class="footer-l">A.R.E.A. Framework · Intent HQ · Workshop Two</div>
    <div class="footer-l">Workshop leads: Lewis Longman-Jones &amp; David Arrowsmith</div>
  </div>`;

  document.getElementById('mainContent').innerHTML=html;

  // ── RADAR CHART ──
  const radarCtx=document.getElementById('radarChart').getContext('2d');
  charts.push(new Chart(radarCtx,{
    type:'radar',
    data:{
      labels:PN,
      datasets:[{
        label:'All participants',
        data:pillarAvgs.map(v=>+v.toFixed(2)),
        backgroundColor:'rgba(61,138,104,0.15)',
        borderColor:'#3d8a68',
        borderWidth:2,
        pointBackgroundColor:'#3d8a68',
        pointRadius:5,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:11},color:'#908c83',backdropColor:'transparent'},
        grid:{color:'rgba(255,255,255,0.06)'},angleLines:{color:'rgba(255,255,255,0.06)'},
        pointLabels:{font:{size:12,family:'Lato'},color:'#c8c4bb'}}},
      plugins:{legend:{display:false}}
    }
  }));

  // ── SECTOR BAR CHART ──
  const barCtx=document.getElementById('sectorBar').getContext('2d');
  const barColors=['rgba(61,138,104,0.75)','rgba(80,110,200,0.75)','rgba(192,138,48,0.75)','rgba(150,80,140,0.75)'];
  const sectorLabels=sectors.map(s=>sectorLabel(s.id).label);
  charts.push(new Chart(barCtx,{
    type:'bar',
    data:{
      labels:sectorLabels,
      datasets:PN.map((name,pi)=>({
        label:P_SHORT[pi],
        data:sectors.map(s=>+s.pillars[pi].toFixed(2)),
        backgroundColor:barColors[pi],
        borderRadius:3,
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{ticks:{color:'#c8c4bb',font:{size:11}},grid:{display:false}},
        y:{min:0,max:5,ticks:{stepSize:1,color:'#908c83'},grid:{color:'rgba(255,255,255,0.05)'}}
      },
      plugins:{legend:{labels:{color:'#c8c4bb',font:{size:11},boxWidth:12}}}
    }
  }));
}

/* ══════════════════════════════════════════════
   AUTO-REFRESH every 60 seconds
══════════════════════════════════════════════ */
let countdown=60;
let countdownTimer=null;

function startCountdown(){
  clearInterval(countdownTimer);
  countdown=60;
  countdownTimer=setInterval(function(){
    countdown--;
    const el=document.getElementById('refreshInfo');
    if(el) el.textContent='Refreshes in '+countdown+'s';
    if(countdown<=0){
      countdown=60;
      loadData();
    }
  },1000);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('refreshBtn').addEventListener('click',function(){
    loadData();
    startCountdown();
  });
  loadData();
  startCountdown();
});
</script>
